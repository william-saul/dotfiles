[addressbooks]
[[init]]
path = ~/.contacts/

[general]
editor = nvim
default_action = list
debug = no

[contact table]
display = formatted_name
group_by_addressbook = no
reverse = no
show_uids = no
show_kinds = no
sort = last_name
localize_dates = yes

preferred_phone_number_type = cell, home
preferred_email_address_type = work, home

[vcard]
preferred_version = 3.0
